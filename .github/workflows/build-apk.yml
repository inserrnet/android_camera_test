name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Generate Gradle Wrapper jar
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -o gradle.zip
          unzip -q gradle.zip
          ./gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1
          test -f gradle/wrapper/gradle-wrapper.jar

      - name: Make Gradle Wrapper executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Verify APK exists
        run: test -f app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CameraRequestMonitor-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
